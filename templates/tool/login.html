{% extends "base.html" %}

{% block title %}Client Portal Login — Vantage Advisory{% endblock %}

{% block head_css %}
<style>
    *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(160deg, #0a1628 0%, #162a4a 50%, #1e3a5f 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }

    .login-container {
        width: 100%;
        max-width: 420px;
    }

    .login-card {
        background: #ffffff;
        border-radius: 12px;
        padding: 3rem 2.5rem 2.5rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .login-brand {
        text-align: center;
        margin-bottom: 2rem;
    }

    .login-brand-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 52px;
        height: 52px;
        background: #c9a84c;
        color: #0a1628;
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 700;
        font-size: 1.5rem;
        border-radius: 8px;
        margin-bottom: 1rem;
    }

    .login-brand h1 {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1.5rem;
        font-weight: 600;
        color: #0a1628;
        margin-bottom: 0.25rem;
    }

    .login-brand p {
        font-size: 0.85rem;
        color: #9ca3af;
    }

    .login-error {
        background: #fce8e6;
        color: #c0392b;
        border: 1px solid #f5c6c0;
        padding: 0.75rem 1rem;
        border-radius: 6px;
        font-size: 0.85rem;
        margin-bottom: 1.5rem;
        text-align: center;
    }

    .login-form-group {
        margin-bottom: 1.25rem;
    }

    .login-form-group label {
        display: block;
        font-size: 0.78rem;
        font-weight: 600;
        color: #0a1628;
        margin-bottom: 0.4rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .login-form-group input {
        width: 100%;
        padding: 0.85rem 1rem;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.95rem;
        color: #0a1628;
        background: #f4f5f7;
        border: 1.5px solid #e8eaed;
        border-radius: 6px;
        outline: none;
        transition: border-color 0.2s, background 0.2s;
    }

    .login-form-group input:focus {
        border-color: #c9a84c;
        background: #ffffff;
    }

    .login-btn {
        width: 100%;
        padding: 0.9rem;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.95rem;
        font-weight: 600;
        color: #0a1628;
        background: #c9a84c;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        letter-spacing: 0.02em;
        margin-top: 0.5rem;
    }

    .login-btn:hover {
        background: #d4b965;
        transform: translateY(-1px);
    }

    .login-btn:active {
        transform: translateY(0);
    }

    .login-footer {
        text-align: center;
        margin-top: 2rem;
    }

    .login-footer a {
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.85rem;
        text-decoration: none;
        transition: color 0.2s;
    }

    .login-footer a:hover {
        color: #c9a84c;
    }
</style>
{% endblock %}

{% block body %}
<div class="login-container">
    <div class="login-card">
        <div class="login-brand">
            <div class="login-brand-mark">V</div>
            <h1>Client Portal</h1>
            <p>Vantage Advisory Group</p>
        </div>

        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('login') }}">
            <div class="login-form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" autofocus>
            </div>
            <div class="login-form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>
    </div>

    <div class="login-footer">
        <a href="{{ url_for('index') }}">&larr; Back to Vantage Advisory</a>
    </div>
</div>
{% endblock %}
